# Render Blueprint — deploys the baccarat backend (WebSocket + API) plus a
# managed Postgres database, all on the free tier.
#
# Everything is driven by env vars, so moving to Railway/Fly later is just a
# redeploy with DATABASE_URL pointed at the new database.

databases:
  - name: baccarat-db
    plan: free
    region: oregon # must match the web service's region (internal DB DNS is per-region)

services:
  - type: web
    name: baccarat
    runtime: node
    plan: free
    region: oregon # same region as the database
    buildCommand: npm install
    startCommand: node src/server.ts
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
      - key: DATABASE_URL
        fromDatabase:
          name: baccarat-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
